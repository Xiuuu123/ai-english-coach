name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Setup env
        env:
          # v16: 通过 env 块安全传递 Key，避免 sed 转义问题
          VITE_API_KEY: ${{ secrets.VITE_API_KEY }}
          VITE_API_URL: ${{ vars.VITE_API_URL || 'https://api.deepseek.com/chat/completions' }}
          VITE_MODEL: ${{ vars.VITE_MODEL || 'deepseek-chat' }}
          VITE_BASE_PATH: ${{ vars.VITE_BASE_PATH || '/' }}
          VITE_APP_TITLE: ${{ vars.VITE_APP_TITLE || 'AI English Coach' }}
        run: |
          # v16: 用 envsubst + 模板生成 .env，兼容 Key 中的任何特殊字符
          export VITE_API_KEY VITE_API_URL VITE_MODEL VITE_BASE_PATH VITE_APP_TITLE
          envsubst < .env.example > .env
          echo "✅ .env 生成完成（API Key 长度: ${#VITE_API_KEY}）"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4